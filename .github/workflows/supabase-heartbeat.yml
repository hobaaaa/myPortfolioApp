name: Supabase Heartbeat

on:
  schedule:
    - cron: "0 8 * * 1"
    - cron: "0 8 * * 3"
    - cron: "0 8 * * 5"
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase heartbeat RPC endpoint
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL or NEXT_PUBLIC_SUPABASE_ANON_KEY is missing."
            exit 1
          fi

          response_file="$(mktemp)"

          http_status="$(curl \
            --show-error \
            --request POST "${SUPABASE_URL}/rest/v1/rpc/heartbeat" \
            --header "apikey: ${SUPABASE_ANON_KEY}" \
            --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{}' \
            --output "$response_file" \
            --write-out "%{http_code}")"

          echo "Supabase heartbeat HTTP status: $http_status"
          echo "Supabase heartbeat response body:"
          cat "$response_file"
          echo

          if [ "$http_status" != "200" ] && [ "$http_status" != "201" ]; then
            echo "Supabase heartbeat failed."
            exit 1
          fi
